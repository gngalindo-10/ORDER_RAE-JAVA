<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ventas - Order Rae</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .table-header-cafe th {
            background-color: #8B5E3C;
            color: white;
            font-weight: 600;
        }
        .card-content {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow-light);
            border: 1px solid var(--border-color);
        }
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-row > * {
            flex: 1;
            min-width: 180px;
        }
        @media (max-width: 768px) {
            .search-row {
                flex-direction: column;
            }
            .search-row .text-end {
                text-align: left !important;
            }
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
                
        <!-- Botón "PAG WEB" solo para Admin y Gerente -->
        <a th:href="@{/index.html}" 
            class="btn-pag-web"
            sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            PAG WEB
        </a>
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- === CONTENIDO DEL DASHBOARD === -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>

        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>

        <a th:href="@{/usuarios}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-users"></i>
            <span class="nav-text">Usuarios</span>
        </a>

        <a th:href="@{/productos}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-boxes"></i>
            <span class="nav-text">Productos</span>
        </a>

        <a th:href="@{/inventario}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <i class="fas fa-warehouse"></i>
            <span class="nav-text">Inventario</span>
        </a>

        <a th:href="@{/produccion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-industry"></i>
            <span class="nav-text">Producción</span>
        </a>

        <a th:href="@{/categoria}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-tags"></i>
            <span class="nav-text">Categorías</span>
        </a>

        <a th:href="@{/pedidos}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-truck"></i>
            <span class="nav-text">Pedidos</span>
        </a>

        <a th:href="@{/ventas}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-cash-register"></i>
            <span class="nav-text">Ventas</span>
        </a>

        <a th:href="@{/fidelizacion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-heart"></i>
            <span class="nav-text">Fidelización</span>
        </a>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="header-dashboard">
            <h1>LISTADO DE VENTAS</h1>
        </div>

        <!-- Mensaje de éxito -->
        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>¡Éxito!</strong> <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card-content">
            <!-- Búsqueda y acciones -->
            <div class="search-row">
                <div>
                    <form th:action="@{/ventas}" method="get" class="d-flex">
                        <input type="text" name="termino"
                                class="form-control me-1"
                                placeholder="Buscar por ID, fecha, total, estado, pedido o fidelización..."
                                th:value="${termino}" />
                        <button type="submit" class="btn btn-cafe">Buscar</button>
                    </form>
                </div>
                <div class="text-end">
                    <a th:href="@{/ventas/reporte(termino=${termino})}" class="btn btn-danger btn-sm me-2">
                        <i class="fas fa-file-pdf me-1"></i> PDF
                    </a>
                    <a th:href="@{/ventas/excel(termino=${termino})}" class="btn btn-success btn-sm me-2">
                        <i class="fas fa-file-excel me-1"></i> Excel
                    </a>
                    <a th:href="@{/ventas/nuevo}" class="btn btn-cafe">Nueva Venta</a>
                </div>
            </div>

            <!-- Tabla de ventas -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-header-cafe">
                        <tr>
                            <th>ID</th>
                            <th>Fecha Venta</th>
                            <th>Total Venta</th>
                            <th>Estado Venta</th>
                            <th>ID Pedido</th>
                            <th>ID Fidelización</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${ventas}">
                            <td th:text="${v.idVenta}"></td>
                            <td th:text="${#temporals.format(v.fechaVenta, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#numbers.formatDecimal(v.totalVenta, 1, 2)}"></td>
                            <td th:text="${v.estadoVenta != null ? v.estadoVenta : '—'}"></td>
                            <td th:text="${v.pedidoId != null ? v.pedidoId : '—'}"></td>
                            <td th:text="${v.fidelizacionId != null ? v.fidelizacionId : '—'}"></td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/ventas/editar/{id}(id=${v.idVenta})}" class="btn btn-sm btn-warning">Editar</a>
                                    <form th:action="@{/ventas/eliminar/{id}(id=${v.idVenta})}" 
                                            method="post" 
                                            onsubmit="return confirm('¿Estás seguro de eliminar esta venta?');">
                                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ventas)}">
                            <td colspan="7" class="text-center text-muted py-3">No hay ventas registradas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
