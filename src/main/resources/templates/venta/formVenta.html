<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${venta.idVenta == null ? 'Registrar Venta' : 'Editar Venta'}">Venta</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .form-card {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            padding: 24px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/ventas}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-cash-register"></i>
            <span class="nav-text">Ventas</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <div class="text-center mb-3">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:100px;">
            </div>

            <h2 class="text-center mb-4" th:text="${venta.idVenta == null ? 'Registrar Venta' : 'Editar Venta'}"></h2>

            <!-- Mensaje de error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>❌ Error:</strong> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{${venta.idVenta == null} ? '/ventas/guardar' : '/ventas/actualizar/' + ${venta.idVenta}}"
                    th:object="${venta}" method="post">

                <!-- Fecha de venta -->
                <div class="mb-3">
                    <label for="fechaVenta" class="form-label">Fecha de venta:</label>
                    <input type="date" 
                            th:value="${venta.fechaVenta != null ? #temporals.format(venta.fechaVenta, 'yyyy-MM-dd') : ''}"
                            name="fechaVenta"
                            class="form-control" required>
                </div>

                <!-- Total de venta -->
                <div class="mb-3">
                    <label for="totalVenta" class="form-label">Total de venta:</label>
                    <input type="number" step="0.01" th:field="*{totalVenta}" class="form-control" required min="0">
                </div>

                <!-- Estado de venta -->
                <div class="mb-3">
                    <label for="estadoVenta" class="form-label">Estado de venta:</label>
                    <select name="estadoVenta" class="form-select" required>
                        <option value="">-- Selecciona estado --</option>
                        <option value="Completada" th:selected="${venta.estadoVenta == 'Completada'}">Completada</option>
                        <option value="Pendiente" th:selected="${venta.estadoVenta == 'Pendiente'}">Pendiente</option>
                        <option value="Cancelada" th:selected="${venta.estadoVenta == 'Cancelada'}">Cancelada</option>
                    </select>
                </div>

                <!-- Pedido ID -->
                <div class="mb-3">
                    <label for="pedidoId" class="form-label">ID del Pedido (opcional):</label>
                    <input type="number" th:field="*{pedidoId}" class="form-control" min="1">
                </div>

                <!-- Fidelización ID -->
                <div class="mb-3">
                    <label for="fidelizacionId" class="form-label">ID de Fidelización (opcional):</label>
                    <input type="number" th:field="*{fidelizacionId}" class="form-control" min="1">
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/ventas}" class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe"
                            th:text="${venta.idVenta == null ? 'Registrar' : 'Actualizar'}">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
