<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - Order Rae</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a th:href="@{/perfil}">Mi Perfil</a>
                    <a th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/usuarios}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-users"></i>
            <span class="nav-text">Usuarios</span>
        </a>
        <a th:href="@{/productos}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-boxes"></i>
            <span class="nav-text">Productos</span>
        </a>
        <a th:href="@{/inventario}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <i class="fas fa-warehouse"></i>
            <span class="nav-text">Inventario</span>
        </a>
        <a th:href="@{/produccion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-industry"></i>
            <span class="nav-text">Producción</span>
        </a>
        <a th:href="@{/categoria}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-tags"></i>
            <span class="nav-text">Categorías</span>
        </a>
        <a th:href="@{/pedidos}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-truck"></i>
            <span class="nav-text">Pedidos</span>
        </a>
        <a th:href="@{/ventas}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-cash-register"></i>
            <span class="nav-text">Ventas</span>
        </a>
        <a th:href="@{/fidelizacion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-heart"></i>
            <span class="nav-text">Fidelización</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="header-dashboard">
            <h1>Panel de Administración</h1>
        </div>

        <div id="admin-content" class="role-content active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <div class="stats">
                <div class="card-dashboard">
                    <h3>Total Ventas</h3>
                    <p th:text="${'S/ ' + #numbers.formatDecimal(totalVentas, 1, 'COMMA', 0, 'POINT')}">S/ 0</p>
                </div>
                <div class="card-dashboard">
                    <h3>Usuarios</h3>
                    <p th:text="${totalClientes}">0</p>
                </div>
                <div class="card-dashboard">
                    <h3>Pedidos</h3>
                    <p th:text="${totalPedidos}">0</p>
                </div>
                <div class="card-dashboard">
                    <h3>Productos</h3>
                    <p th:text="${totalProductos}">0</p>
                </div>
            </div>
        </div>

        <div id="asesor-content" class="role-content" sec:authorize="hasAuthority('ROLE_Asesor Comercial')">
            <div class="stats">
                <div class="card-dashboard full-width">
                    <p th:text="${mensaje}">Cargando...</p>
                </div>
            </div>
        </div>

        <div id="logistico-content" class="role-content" sec:authorize="hasAuthority('ROLE_Jefe Logistico')">
            <div class="stats">
                <div class="card-dashboard full-width">
                    <p th:text="${mensaje}">Cargando...</p>
                </div>
            </div>
        </div>

        <div class="chart-container" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <canvas id="myChart"></canvas>
        </div>
    </main>
</div>

<script th:src="@{/js/dashboard.js}"></script>

<script th:inline="javascript" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
    const ctx = document.getElementById('myChart').getContext('2d');
    const meses = /*[[${meses}]]*/ [];
    const ventas = /*[[${ventas}]]*/ [];

    Chart.defaults.font.family = "'Figtree', sans-serif";

    new Chart(ctx, {
        type: 'line',
        data : {
            labels: meses,
            datasets: [{
                label: 'Ventas Mensuales (S/)',
                data: ventas,
                borderColor: '#2E7D32',
                backgroundColor: 'rgba(46, 125, 50, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#2E7D32',
                pointBorderWidth: 2,
                pointRadius: 5,
                pointHoverRadius: 8,
                pointHoverBackgroundColor: '#2E7D32',
                pointHoverBorderColor: '#fff',
                pointHoverBorderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 1200,
                easing: 'easeOutQuint'
            },
            plugins: {
                legend: {
                    position: 'top',
                    labels: {
                        color: '#222',
                        font: { size: 13, weight: '600' },
                        padding: 15
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(255, 255, 255, 0.98)',
                    titleColor: '#1B5E20',
                    bodyColor: '#333',
                    borderColor: '#ccc',
                    borderWidth: 1,
                    padding: 12,
                    usePointStyle: true,
                    callbacks: {
                        label: function(context) {
                            const value = context.parsed.y;
                            return new Intl.NumberFormat('es-PE', {
                                style: 'currency',
                                currency: 'PEN',
                                minimumFractionDigits: 0
                            }).format(value);
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(0,0,0,0.03)' },
                    ticks: { color: '#444', font: { weight: '600' } }
                },
                y: {
                    beginAtZero: false,
                    grid: { color: 'rgba(0,0,0,0.05)' },
                    ticks: {
                        color: '#444',
                        callback: function(value) {
                            return 'S/ ' + value.toLocaleString('es-PE');
                        }
                    }
                }
            },
            interaction: {
                intersect: false,
                mode: 'index'
            }
        }
    });
</script>

</body>
</html>
