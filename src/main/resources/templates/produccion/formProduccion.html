<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${produccion.idProduccion == null ? 'Registrar Producción' : 'Editar Producción'}">Producción</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .form-card {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            padding: 24px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/produccion}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-industry"></i>
            <span class="nav-text">Producción</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <div class="text-center mb-3">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:100px;">
            </div>

            <h2 class="text-center mb-4" th:text="${produccion.idProduccion == null ? 'Registrar Producción' : 'Editar Producción'}"></h2>

            <form th:action="@{${produccion.idProduccion == null} ? '/produccion/guardar' : '/produccion/actualizar/' + ${produccion.idProduccion}}"
                    method="post">

                <input type="hidden" th:if="${produccion.idProduccion != null}" name="idProduccion" th:value="${produccion.idProduccion}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="codigoProducto" class="form-label">Código producto:</label>
                        <input type="text" id="codigoProducto" name="codigoProducto" th:value="${produccion.codigoProducto}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="referenciaProducto" class="form-label">Referencia:</label>
                        <input type="text" id="referenciaProducto" name="referenciaProducto" th:value="${produccion.referenciaProducto}" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="categoriaProducto" class="form-label">Categoría:</label>
                        <input type="text" id="categoriaProducto" name="categoriaProducto" th:value="${produccion.categoriaProducto}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="colorProducto" class="form-label">Color:</label>
                        <input type="text" id="colorProducto" name="colorProducto" th:value="${produccion.colorProducto}" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="materialProducto" class="form-label">Material:</label>
                        <input type="text" id="materialProducto" name="materialProducto" th:value="${produccion.materialProducto}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cantidadProducto" class="form-label">Cantidad:</label>
                        <input type="number" id="cantidadProducto" name="cantidadProducto" th:value="${produccion.cantidadProducto}" class="form-control" min="1" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="estadoProducto" class="form-label">Estado:</label>
                        <select id="estadoProducto" name="estadoProducto" class="form-select" required>
                            <option value="">-- Selecciona --</option>
                            <option value="Entregado" th:selected="${produccion.estadoProducto == 'Entregado'}">Entregado</option>
                            <option value="Pendiente" th:selected="${produccion.estadoProducto == 'Pendiente'}">Pendiente</option>
                            <option value="En Proceso" th:selected="${produccion.estadoProducto == 'En Proceso'}">En Proceso</option>
                            <option value="Cancelado" th:selected="${produccion.estadoProducto == 'Cancelado'}">Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="usuariosId" class="form-label">Usuario:</label>
                        <select id="usuariosId" name="usuariosId" class="form-select" required>
                            <option value="">-- Selecciona --</option>
                            <option th:each="u : ${usuarios}" 
                                    th:value="${u.id}" 
                                    th:text="${u.nombre + ' ' + u.apellidos}"
                                    th:selected="${u.id == produccion.usuario?.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="productoId" class="form-label">Producto (opcional):</label>
                    <select id="productoId" name="productoId" class="form-select">
                        <option value="">-- Ninguno --</option>
                        <option th:each="p : ${productos}" 
                                th:value="${p.id}" 
                                th:text="${p.referenciaProducto}"
                                th:selected="${p.id == produccion.producto?.id}">
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/produccion}" class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe">Guardar</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
