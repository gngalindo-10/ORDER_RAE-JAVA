<!DOCTYPE html>
<html lang="es" 
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${usuario.id == null ? 'Registrar Usuario' : 'Editar Usuario'}">Formulario Usuario</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .form-card {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            padding: 24px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/usuarios}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-users"></i>
            <span class="nav-text">Usuarios</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <div class="text-center mb-3">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:100px;">
            </div>

            <h2 class="text-center mb-4" th:text="${usuario.id == null ? 'Registrar Usuario' : 'Editar Usuario'}"></h2>

            <!-- Formulario para ADMIN -->
            <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                    th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" th:field="*{nombre}" id="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="apellidos" class="form-label">Apellidos:</label>
                        <input type="text" th:field="*{apellidos}" id="apellidos" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="documento" class="form-label">Documento:</label>
                        <input type="text" th:field="*{documento}" id="documento" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="correo" class="form-label">Correo:</label>
                        <input type="email" th:field="*{correo}" id="correo" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña:</label>
                    <input type="password" th:field="*{password}" id="password" class="form-control" 
                            th:required="${usuario.id == null}">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="genero" class="form-label">Género:</label>
                        <select th:field="*{genero}" id="genero" class="form-select">
                            <option value="">-- Seleccione --</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="telefono" class="form-label">Teléfono:</label>
                        <input type="text" th:field="*{telefono}" id="telefono" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="estado" class="form-label">Estado:</label>
                        <select th:field="*{estado}" id="estado" class="form-select">
                            <option value="">-- Seleccione --</option>
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="rol.id" class="form-label">Rol:</label>
                        <select th:field="*{rol.id}" id="rol.id" class="form-select" required>
                            <option value="">-- Selecciona rol --</option>
                            <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombreRol}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/usuarios}" class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe">Guardar</button>
                </div>
            </form>

            <!-- Formulario para USUARIO (solo perfil) -->
            <form th:if="${#authorization.expression('!hasRole(''ADMIN'')')}"
                    th:action="@{/perfil/guardar}" th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" th:field="*{nombre}" id="nombre" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="apellidos" class="form-label">Apellidos:</label>
                    <input type="text" th:field="*{apellidos}" id="apellidos" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono:</label>
                    <input type="text" th:field="*{telefono}" id="telefono" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña (dejar vacío para no cambiar):</label>
                    <input type="password" th:field="*{password}" id="password" class="form-control">
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="${#authorization.expression('hasRole(''Cliente'')') ? '/' : '/dashboard'}"
                        class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe">Guardar</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
