<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Categorías - Order Rae</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .badge.bg-success { background-color: #28a745 !important; }
        .badge.bg-danger { background-color: #dc3545 !important; }
        .table-header-cafe th {
            background-color: #8B5E3C;
            color: white;
            font-weight: 600;
        }
        .card-content {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow-light);
            border: 1px solid var(--border-color);
        }
        .search-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }
        .search-controls > * {
            flex: 1;
            min-width: 150px;
        }
        @media (max-width: 768px) {
            .search-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- === CONTENIDO DEL DASHBOARD === -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>

        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>

        <a th:href="@{/usuarios}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-users"></i>
            <span class="nav-text">Usuarios</span>
        </a>

        <a th:href="@{/productos}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-boxes"></i>
            <span class="nav-text">Productos</span>
        </a>

        <a th:href="@{/inventario}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <i class="fas fa-warehouse"></i>
            <span class="nav-text">Inventario</span>
        </a>

        <a th:href="@{/produccion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-industry"></i>
            <span class="nav-text">Producción</span>
        </a>

        <a th:href="@{/categoria}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-tags"></i>
            <span class="nav-text">Categorías</span>
        </a>

        <a th:href="@{/pedidos}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-truck"></i>
            <span class="nav-text">Pedidos</span>
        </a>

        <a th:href="@{/ventas}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-cash-register"></i>
            <span class="nav-text">Ventas</span>
        </a>

        <a th:href="@{/fidelizacion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-heart"></i>
            <span class="nav-text">Fidelización</span>
        </a>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="header-dashboard">
            <h1>LISTADO DE LAS CATEGORÍAS</h1>
        </div>

        <!-- Mensaje de éxito -->
        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>¡Éxito!</strong> <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card-content">
            <!-- Controles de búsqueda y filtros -->
            <div class="search-controls">
                <!-- Búsqueda -->
                <form th:action="@{/categoria}" method="get" class="d-flex">
                    <input type="text" name="termino"
                            class="form-control me-1"
                            placeholder="Buscar por ID, nombre o estado..."
                            th:value="${termino}"
                            style="min-width: 200px;"/>
                    <button type="submit" class="btn btn-cafe">Buscar</button>
                </form>

                <!-- Filtros rápidos -->
                <div class="btn-group" role="group">
                    <a th:href="@{/categoria}" class="btn btn-outline-secondary btn-sm">Todas</a>
                    <a th:href="@{/categoria(estado='activo')}" class="btn btn-success btn-sm">Activas</a>
                    <a th:href="@{/categoria(estado='inactivo')}" class="btn btn-danger btn-sm">Inactivas</a>
                </div>

                <!-- Nuevo -->
                <div class="ms-auto">
                    <a th:href="@{/categoria/nuevo}" class="btn btn-cafe btn-sm">Nueva Categoría</a>
                </div>
            </div>

            <!-- Tabla de categorías -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-header-cafe">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="categoria : ${categorias}">
                            <td th:text="${categoria.id}"></td>
                            <td th:text="${categoria.nombreCategoria}"></td>
                            <td>
                                <span th:class="${categoria.estadoCategoria == 'activo' ? 'badge bg-success' : 'badge bg-danger'}"
                                        th:text="${categoria.estadoCategoria == 'activo' ? 'Activo' : 'Inactivo'}"></span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/categoria/editar/{id}(id=${categoria.id})}" class="btn btn-sm btn-warning">Editar</a>
                                    <a th:href="@{/categoria/eliminar/{id}(id=${categoria.id})}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('¿Está seguro de eliminar esta categoría?')">
                                        Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categorias)}">
                            <td colspan="4" class="text-center text-muted py-3">No hay categorías registradas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
