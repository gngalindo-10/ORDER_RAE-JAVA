<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inventario - Order Rae</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .table-header-cafe th {
            background-color: #8B5E3C;
            color: white;
            font-weight: 600;
        }
        .card-content {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow-light);
            border: 1px solid var(--border-color);
        }
        .fecha-col {
            font-size: 0.95rem;
            color: #4d4d4d;
            font-weight: 500;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- === CONTENIDO DEL DASHBOARD === -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>

        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>

        <a th:href="@{/usuarios}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-users"></i>
            <span class="nav-text">Usuarios</span>
        </a>

        <a th:href="@{/productos}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-boxes"></i>
            <span class="nav-text">Productos</span>
        </a>

        <a th:href="@{/inventario}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <i class="fas fa-warehouse"></i>
            <span class="nav-text">Inventario</span>
        </a>

        <a th:href="@{/produccion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-industry"></i>
            <span class="nav-text">Producción</span>
        </a>

        <a th:href="@{/categoria}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Jefe Logistico')">
            <i class="fas fa-tags"></i>
            <span class="nav-text">Categorías</span>
        </a>

        <a th:href="@{/pedidos}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-truck"></i>
            <span class="nav-text">Pedidos</span>
        </a>

        <a th:href="@{/ventas}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-cash-register"></i>
            <span class="nav-text">Ventas</span>
        </a>

        <a th:href="@{/fidelizacion}" class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial')">
            <i class="fas fa-heart"></i>
            <span class="nav-text">Fidelización</span>
        </a>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="header-dashboard">
            <h1>GESTIÓN DE INVENTARIO</h1>
        </div>

        <div class="card-content">
            <div class="text-end mb-3">
                <a th:href="@{/inventario/nuevo}" class="btn btn-cafe">Nuevo Registro</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-header-cafe">
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Usuario</th>
                            <th>Cantidad</th>
                            <th>Fecha Creación</th>
                            <th>Última Actualización</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${inventarios}">
                            <td th:text="${inv.id}"></td>
                            <td th:text="${inv.producto?.referenciaProducto ?: 'Sin producto'}"></td>
                            <td th:text="${inv.usuario?.nombre + ' ' + inv.usuario?.apellidos ?: 'Sin usuario'}"></td>
                            <td th:text="${inv.cantidad}"></td>
                            <td class="fecha-col"
                                th:text="${inv.createdAt != null ? #temporals.format(inv.createdAt, 'dd/MM/yyyy — hh:mm a') : '---'}">
                            </td>
                            <td class="fecha-col"
                                th:text="${inv.updatedAt != null ? #temporals.format(inv.updatedAt, 'dd/MM/yyyy — hh:mm a') : 'Sin actualizar'}">
                            </td>
                            <td class="text-center">
                                <a th:href="@{/inventario/editar/{id}(id=${inv.id})}" class="btn btn-sm btn-warning">Editar</a>
                                <a th:href="@{/inventario/eliminar/{id}(id=${inv.id})}"
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('¿Está seguro de eliminar este registro de inventario?')">
                                    Eliminar
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(inventarios)}">
                            <td colspan="7" class="text-center text-muted py-3">No hay registros de inventario.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
