<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${inventario.id == null ? 'Registrar Inventario' : 'Editar Inventario'}">Inventario</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .form-card {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            padding: 24px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/inventario}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente')">
            <i class="fas fa-warehouse"></i>
            <span class="nav-text">Inventario</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <div class="text-center mb-3">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:100px;">
            </div>

            <h2 class="text-center mb-4" th:text="${inventario.id == null ? 'Registrar Inventario' : 'Editar Inventario'}"></h2>

            <form th:action="${inventario.id == null} ? @{/inventario/guardar} : @{/inventario/actualizar/{id}(id=${inventario.id})}"
                    th:object="${inventario}" method="post">

                <input type="hidden" th:if="${inventario.id != null}" th:field="*{id}" />

                <!-- Producto -->
                <div class="mb-3">
                    <label for="producto.id" class="form-label">Producto:</label>
                    <select th:field="*{producto.id}" id="producto.id" class="form-select" required>
                        <option value="">-- Selecciona producto --</option>
                        <option th:each="p : ${productos}"
                                th:value="${p.id}"
                                th:text="${p.referenciaProducto}">
                        </option>
                    </select>
                </div>

                <!-- Usuario -->
                <div class="mb-3">
                    <label for="usuario.id" class="form-label">Usuario:</label>
                    <select th:field="*{usuario.id}" id="usuario.id" class="form-select" required>
                        <option value="">-- Selecciona usuario --</option>
                        <option th:each="u : ${usuarios}"
                                th:value="${u.id}"
                                th:text="${u.nombre + ' ' + u.apellidos}">
                        </option>
                    </select>
                </div>

                <!-- Cantidad -->
                <div class="mb-3">
                    <label for="cantidad" class="form-label">Cantidad:</label>
                    <input type="number" th:field="*{cantidad}" id="cantidad" class="form-control" required min="0">
                </div>

                <!-- Fechas (solo en edición) -->
                <div th:if="${inventario.id != null}">
                    <div class="mb-3">
                        <label class="form-label">Fecha de Creación:</label>
                        <input type="text" class="form-control"
                                th:value="${#temporals.format(inventario.createdAt, 'dd/MM/yyyy — hh:mm a')}"
                                readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Última Actualización:</label>
                        <input type="text" class="form-control"
                                th:value="${inventario.updatedAt != null ? #temporals.format(inventario.updatedAt, 'dd/MM/yyyy — hh:mm a') : 'Sin actualizar'}"
                                readonly>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/inventario}" class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe">Guardar</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
