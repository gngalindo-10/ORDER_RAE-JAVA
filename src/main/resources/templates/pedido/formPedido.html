<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pedido.idPedido == null ? 'Registrar Pedido' : 'Editar Pedido'}">Pedido</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos del dashboard -->
    <link rel="stylesheet" th:href="@{/css/estilos_dashboard.css}">
    
    <style>
        .btn-cafe {
            background-color: #8B5E3C;
            border-color: #8B5E3C;
        }
        .btn-cafe:hover {
            background-color: #7A4B32;
            border-color: #7A4B32;
        }
        .form-card {
            background-color: var(--color-light);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-medium);
            padding: 24px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: none;
        }
    </style>
</head>
<body>

<!-- === BARRA SUPERIOR === -->
<header id="barra_superior">
    <div class="barra-contenido">
        <img th:src="@{/images/Logo3-orden.png}" alt="Logo Order Rae" class="logo_principal">
        <div class="user-info">
            <div class="menu-usuario">
                <img th:src="@{/images/Usuario2.png}" alt="Usuario" class="icono-img">
                <div class="submenu">
                    <a href="#" th:href="@{/perfil}">Mi Perfil</a>
                    <a href="#" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="logo-dashboard">
            <i class="fas fa-box-open"></i>
            <span>Order Rae</span>
        </div>
        <a th:href="@{/dashboard}" class="nav-item" sec:authorize="!hasAuthority('ROLE_Cliente')">
            <i class="fas fa-chart-line"></i>
            <span class="nav-text">Dashboard</span>
        </a>
        <a th:href="@{/pedidos}" class="nav-item active" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_Gerente','ROLE_Asesor Comercial','ROLE_Jefe Logistico')">
            <i class="fas fa-truck"></i>
            <span class="nav-text">Pedidos</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="form-card">
            <div class="text-center mb-3">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:100px;">
            </div>

            <h2 class="text-center mb-4" th:text="${pedido.idPedido == null ? 'Registrar Pedido' : 'Editar Pedido'}"></h2>

            <form th:action="@{${pedido.idPedido == null} ? '/pedidos/guardar' : '/pedidos/actualizar/' + ${pedido.idPedido}}"
                    th:object="${pedido}" method="post">

                <!-- Fecha de compra -->
                <div class="mb-3">
                    <label for="fechaCompra" class="form-label">Fecha de compra:</label>
                    <input type="date" th:field="*{fechaCompra}" id="fechaCompra" class="form-control" required>
                </div>

                <!-- Fecha de entrega -->
                <div class="mb-3">
                    <label for="fechaEntrega" class="form-label">Fecha de entrega:</label>
                    <input type="date" th:field="*{fechaEntrega}" id="fechaEntrega" class="form-control" required>
                </div>

                <!-- Método de pago -->
                <div class="mb-3">
                    <label for="metodoPago" class="form-label">Método de pago:</label>
                    <select th:field="*{metodoPago}" id="metodoPago" class="form-select" required>
                        <option value="">-- Selecciona método --</option>
                        <option value="tarjeta">Tarjeta</option>
                        <option value="transferencia">Transferencia</option>
                        <option value="efectivo">Efectivo</option>
                        <option value="pago_movil">Pago móvil</option>
                        <option value="credito">Crédito</option>
                    </select>
                </div>

                <!-- Total de pago -->
                <div class="mb-3">
                    <label for="totalDePago" class="form-label">Total de pago:</label>
                    <input type="number" step="0.01" th:field="*{totalDePago}" id="totalDePago" class="form-control" required min="0">
                </div>

                <!-- Estado del pedido -->
                <div class="mb-3">
                    <label for="estadoPedido" class="form-label">Estado del pedido:</label>
                    <select th:field="*{estadoPedido}" id="estadoPedido" class="form-select" required>
                        <option value="">-- Selecciona estado --</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En proceso">En proceso</option>
                        <option value="Enviado">Enviado</option>
                        <option value="Entregado">Entregado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/pedidos}" class="btn btn-cafe">Volver</a>
                    <button type="submit" class="btn btn-cafe"
                            th:text="${pedido.idPedido == null ? 'Registrar' : 'Actualizar'}">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
